<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <h2 th:text="#{findOwners}">Find Owners</h2>

  <form th:object="${owner}" th:action="@{/owners}" method="get" class="form-horizontal" id="search-owner-form">
    <!--ファーストネーム-->
    <div class="form-group">
      <div class="control-group" id="firstNameGroup">
        <label class="col-sm-2 control-label" th:text="#{firstName}">First name </label>
        <div class="col-sm-10">
          <input class="form-control" th:field="*{firstName}" size="30" maxlength="80" />
          <span class="help-inline">
            <div th:if="${#fields.hasAnyErrors()}">
              <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
            </div>
          </span>
        </div>
      </div>
    </div>
    <!--ラストネーム-->
    <div class="form-group">
      <div class="control-group" id="lastNameGroup">
        <label class="col-sm-2 control-label" th:text="#{lastName}">Last name </label>
        <div class="col-sm-10">
          <input class="form-control" th:field="*{lastName}" size="30" maxlength="80" />
          <span class="help-inline">
            <div th:if="${#fields.hasAnyErrors()}">
              <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
            </div>
          </span>
        </div>
      </div>
    </div>
    <!--メールアドレス-->
    <div class="form-group">
      <div class="control-group" id="addressGroup">
        <label class="col-sm-2 control-label" th:text="#{address}">Address </label>
        <div class="col-sm-10">
          <input class="form-control" th:field="*{address}" size="30" maxlength="255" />
          <span class="help-inline">
            <div th:if="${#fields.hasAnyErrors()}">
              <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
            </div>
          </span>
        </div>
      </div>
    </div>
    <!--市-->
    <div class="form-group">
      <div class="control-group" id="cityGroup">
        <label class="col-sm-2 control-label" th:text="#{city}">City </label>
        <div class="col-sm-10">
          <input class="form-control" th:field="*{city}" size="30" maxlength="80" />
          <span class="help-inline">
            <div th:if="${#fields.hasAnyErrors()}">
              <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
            </div>
          </span>
        </div>
      </div>
    </div>
    <!--電話番号-->
    <div class="form-group">
      <div class="control-group" id="telephoneGroup">
        <label class="col-sm-2 control-label" th:text="#{telephone}">Telephone </label>
        <div class="col-sm-10">
          <input class="form-control" th:field="*{telephone}" size="30" maxlength="20" />
          <span class="help-inline">
            <div th:if="${#fields.hasAnyErrors()}">
              <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
            </div>
          </span>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary" th:text="#{findOwner}">Find Owner</button>
      </div>
    </div>

    <a class="btn btn-primary" th:href="@{/owners/new}" th:text="#{addOwner}">Add Owner</a>

  </form>

</body>

</html>
